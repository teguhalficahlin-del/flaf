name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate secrets.js
        run: |
          cat > secrets.js << 'EOF'
          export const SECRET_SALT = '${{ secrets.SECRET_SALT }}';
          export const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          export const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          export const ADMIN_EMAIL = '${{ secrets.ADMIN_EMAIL }}';
          EOF

      - name: Verify secrets.js
        run: |
          echo "--- Lokasi file ---"
          pwd
          ls -la secrets.js
          echo "--- Jumlah baris (harus 4) ---"
          wc -l < secrets.js
          echo "--- Jumlah export (harus 4) ---"
          grep -c "^export const" secrets.js
          echo "--- Cek nilai kosong (harus tidak ada output) ---"
          grep -n "= '';" secrets.js || echo "OK: tidak ada nilai kosong"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLAF Converter — txt → v5.0 JS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 2rem 1.5rem;
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.5;
    }

    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.2rem; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; font-family: monospace; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #30363d;
      border-radius: 8px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #58a6ff;
      background: #111827;
    }
    .drop-zone input[type="file"] { display: none; }
    .drop-zone label {
      color: #58a6ff;
      cursor: pointer;
      font-weight: 500;
    }
    .drop-zone .hint {
      margin-top: 0.4rem;
      color: #8b949e;
      font-size: 0.8rem;
    }

    /* Preview card */
    .preview {
      margin-top: 1.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      display: none;
    }
    .preview h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 0.75rem;
    }
    .stat {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
      font-size: 0.875rem;
    }
    .stat-label { color: #8b949e; min-width: 130px; flex-shrink: 0; }
    .stat-val   { color: #e6edf3; }
    code {
      font-family: monospace;
      background: #0d1117;
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-size: 0.8em;
      color: #79c0ff;
    }

    /* Warning box */
    .warn-box {
      background: #1f1a0c;
      border: 1px solid #9e6a03;
      border-radius: 4px;
      padding: 0.65rem 0.9rem;
      margin-top: 0.9rem;
      font-size: 0.8rem;
      color: #e3b341;
    }
    .warn-box strong { display: block; margin-bottom: 0.3rem; }
    .warn-box ul { padding-left: 1.25rem; }
    .warn-box li { margin-bottom: 0.15rem; }

    /* Error box */
    .error-box {
      background: #1c0f0f;
      border: 1px solid #f85149;
      border-radius: 4px;
      padding: 0.65rem 0.9rem;
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #f85149;
      display: none;
    }

    /* Button */
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.7rem 1rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #2ea043; }
    .btn:disabled {
      background: #21262d;
      color: #484f58;
      cursor: default;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>FLAF Skenario Converter</h1>
  <p class="subtitle">flaf-skenario-tp{N}-v2.txt &rarr; tp-{N}-v5.js</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".txt">
    <label for="fileInput">&#128194; Pilih file .txt</label>
    <p class="hint">atau drag &amp; drop di sini &mdash; semua proses di browser, tidak ada upload</p>
  </div>

  <div class="preview" id="previewCard">
    <h2>Preview</h2>
    <div id="previewContent"></div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <button class="btn" id="convertBtn" disabled>Convert &amp; Download</button>

  <p class="footer">Semua konversi dilakukan di browser &mdash; file tidak dikirim ke server manapun.</p>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let parsedData = null;

// ─────────────────────────────────────────────────────────────
// DOM wiring
// ─────────────────────────────────────────────────────────────
const fileInput   = document.getElementById('fileInput');
const dropZone    = document.getElementById('dropZone');
const previewCard = document.getElementById('previewCard');
const previewContent = document.getElementById('previewContent');
const errorBox    = document.getElementById('errorBox');
const convertBtn  = document.getElementById('convertBtn');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

convertBtn.addEventListener('click', () => {
  if (!parsedData) return;
  const js = generateJS(parsedData);
  downloadText(parsedData.filename, js);
});

// ─────────────────────────────────────────────────────────────
// File handling
// ─────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file.name.endsWith('.txt')) {
    showError('File harus berformat .txt');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parsedData = parseSkenario(e.target.result);
      renderPreview(parsedData);
      clearError();
      convertBtn.disabled = false;
    } catch (err) {
      showError('Parse error: ' + err.message);
      parsedData = null;
      convertBtn.disabled = true;
      previewCard.style.display = 'none';
    }
  };
  reader.onerror = () => showError('Gagal membaca file.');
  reader.readAsText(file, 'UTF-8');
}

function renderPreview(data) {
  const total = data.skenario.reduce((s, f) => s + f.langkah.length, 0);
  const breakdown = data.skenario.map(f => `${f.fase}&nbsp;${f.langkah.length}`).join(' + ');

  let html = `
    <div class="stat"><span class="stat-label">TP</span><span class="stat-val">${data.nomor} &mdash; ${esc(data.nama)}</span></div>
    <div class="stat"><span class="stat-label">Tema</span><span class="stat-val">${esc(data.tema) || '<em style="color:#8b949e">tidak ditemukan</em>'}</span></div>
    <div class="stat"><span class="stat-label">Total langkah</span><span class="stat-val">${total} &nbsp;(${breakdown})</span></div>
    <div class="stat"><span class="stat-label">Checklist</span><span class="stat-val">${data.checklist.length} item</span></div>
    <div class="stat"><span class="stat-label">energi_map</span><span class="stat-val">${data.energi_map.length} entry</span></div>
    <div class="stat"><span class="stat-label">catatan.risiko</span><span class="stat-val">${data.catatan.risiko.length} item</span></div>
    <div class="stat"><span class="stat-label">catatan.autonomy</span><span class="stat-val">${data.catatan.autonomy.length} item</span></div>
    <div class="stat"><span class="stat-label">Output file</span><span class="stat-val"><code>${esc(data.filename)}</code></span></div>
  `;

  if (data.warnings.length) {
    html += '<div class="warn-box"><strong>&#9888; Perlu perhatian:</strong><ul>';
    data.warnings.forEach(w => { html += `<li>${esc(w)}</li>`; });
    html += '</ul></div>';
  }

  previewContent.innerHTML = html;
  previewCard.style.display = 'block';
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  previewCard.style.display = 'none';
}

function clearError() {
  errorBox.textContent = '';
  errorBox.style.display = 'none';
}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/javascript;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ─────────────────────────────────────────────────────────────
// Parser
// ─────────────────────────────────────────────────────────────

function parseSkenario(text) {
  const warnings = [];

  // ── 1. Header ──────────────────────────────────────────────
  // "TP 15 — FEELINGS AND EMOTIONS" (em-dash or regular dash)
  const headerMatch = text.match(/^TP\s+(\d+)\s*[—\-]+\s*(.+)/m);
  if (!headerMatch) {
    throw new Error('Format tidak dikenali — baris "TP N — JUDUL" tidak ditemukan di awal file');
  }
  const nomor   = parseInt(headerMatch[1], 10);
  const nPad    = String(nomor).padStart(2, '0');
  const nama    = toTitleCase(headerMatch[2].trim());
  const id      = `tp-${nPad}`;
  const varName = `TP_${nPad}`;
  const filename = `tp-${nPad}-v5.js`;

  const temaMatch = text.match(/^Tema:\s*(.+)/m);
  const tema = temaMatch ? temaMatch[1].trim() : '';
  if (!tema) warnings.push('Baris "Tema:" tidak ditemukan — field tema akan kosong');

  // ── 2. Split into blocks by ════ dividers ──────────────────
  // ═ = BOX DRAWINGS DOUBLE HORIZONTAL (═)
  const blocks = text.split(/═{3,}/);

  // ── 3. Parse layers ────────────────────────────────────────
  const layers = [];
  for (const block of blocks) {
    const trimmed = block.trim();
    if (!trimmed) continue;
    const firstLine = trimmed.split('\n')[0].trim();
    if (/^LAYAR\s+\d+/.test(firstLine)) {
      layers.push(parseLayer(trimmed));
    }
  }

  if (layers.length === 0) {
    throw new Error('Tidak ada LAYAR yang terdeteksi — pastikan file menggunakan format flaf-skenario-tp{N}-v2.txt');
  }

  // ── 4. Parse checklist (scan full text) ────────────────────
  const checklist = [];
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (t.startsWith('[ ] ') || t === '[ ]') {
      checklist.push(t.slice(4).trim());  // strip "[ ] "
    }
  }
  if (checklist.length === 0) {
    warnings.push('✅ CHECKLIST tidak ditemukan — field checklist akan kosong');
  }

  // ── 5. Parse catatan (scan full text) ──────────────────────
  const catatan = parseCatatan(text, warnings);

  // ── 6. Build energi_map from layer headers ─────────────────
  const energi_map = layers.map(l => `L${l.num} ${l.energi}`);

  // ── 7. Group into skenario phases ──────────────────────────
  const skenario = buildSkenario(layers);

  // ── 8. Content warnings ────────────────────────────────────
  layers.forEach(l => {
    if (!l.teks.trim()) {
      warnings.push(`L${l.num}: teks kosong — periksa blok layar ini`);
    }
  });
  warnings.push(
    'durasi fase diset default (Pembuka=10, Inti=30, Penutup=10) — verifikasi manual jika berbeda'
  );
  warnings.push(
    'kelas / deskripsi / indikator / vocab / persiapan / media / printables harus diisi manual'
  );

  return {
    nomor, nPad, id, varName, filename,
    nama, tema,
    checklist, energi_map, catatan, skenario,
    warnings,
  };
}

// ── Parse one LAYAR block ──────────────────────────────────────
function parseLayer(blockText) {
  const lines = blockText.split('\n').map(l => l.trimEnd());

  // Find first two non-empty lines
  const nonEmpty = lines.filter(l => l.trim());
  const headerLine = nonEmpty[0] || '';
  const energiLine = nonEmpty[1] || '';

  // Layer number
  const numMatch = headerLine.match(/^LAYAR\s+(\d+)/);
  const num = numMatch ? parseInt(numMatch[1], 10) : -1;

  // Category: text between " — " and " · " in header
  // e.g. "LAYAR 7 — RESET + LISTEN FIRST · Frame …"
  const afterDash = headerLine.replace(/^LAYAR\s+\d+\s*[—\-]+\s*/, '');
  const category  = afterDash.split(/\s*·\s*/)[0].trim();  // split on · (U+00B7)

  // Energi from second line
  const energi = extractEnergi(energiLine);

  // Find content start (lines after the first 2 non-empty lines)
  let nonEmptyFound = 0;
  let contentStart  = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim()) {
      nonEmptyFound++;
      if (nonEmptyFound === 2) { contentStart = i + 1; break; }
    }
  }
  const contentLines = lines.slice(contentStart);

  // Classify content lines
  const teksLines = [];
  const bantuan   = [];
  let cue     = null;
  let darurat = null;

  // Markers (handle both literal char and escape form)
  const BANTUAN_RE = /^BANTUAN\s*[▸►]\s*/;  // ▸ or ►
  const CUE_RE     = /^[⚡★]\s*Cue kritis:\s*/i;  // ⚡ or ★
  const DARURAT_RE = /^[⚠⛔]\s*DARURAT:\s*/i;     // ⚠ or ⛔

  for (const line of contentLines) {
    const t = line.trim();
    if (!t || t === '---') continue;

    if (BANTUAN_RE.test(t)) {
      const text = t.replace(BANTUAN_RE, '').trim();
      if (text) bantuan.push(text);
    } else if (CUE_RE.test(t)) {
      cue = t.replace(CUE_RE, '').trim();
    } else if (DARURAT_RE.test(t)) {
      darurat = t.replace(DARURAT_RE, '').trim();
    } else {
      teksLines.push(t);
    }
  }

  const teks = teksLines.join(' ').replace(/\s{2,}/g, ' ').trim();

  const bantuanVal =
    bantuan.length === 0 ? null :
    bantuan.length === 1 ? bantuan[0] :
    bantuan;

  const fase = determineFase(category);

  return { num, fase, energi, teks, bantuan: bantuanVal, cue, darurat };
}

// ── Determine fase from CATEGORY string ───────────────────────
function determineFase(category) {
  const u = category.toUpperCase();
  if (u.includes('PEMBUKA') || u.includes('PRE-OPENING')) return 'Pembuka';
  if (u.includes('PENUTUP'))                  return 'Penutup';
  // INTI, RESET, RETRIEVAL, LISTEN FIRST, etc.
  return 'Inti';
}

// ── Extract energi emoji(s) from header line 2 ────────────────
// "🔵 Calm"           → "🔵"
// "⚪ Reset → 🟡 Focused" → "⚪ → 🟡"
// "⚪ Reset"           → "⚪"
function extractEnergi(line) {
  return line
    .replace(/\b[A-Za-z]+\b/g, '')   // remove label words (Calm, Active, …)
    .replace(/\s*→\s*/g, ' → ') // normalize → (U+2192)
    .replace(/\s+/g, ' ')
    .trim();
}

// ── Parse catatan section ──────────────────────────────────────
function parseCatatan(text, warnings) {
  const risiko   = [];
  const autonomy = [];

  // Bullet char variants: · (U+00B7), • (U+2022), ‧ (U+2027)
  const BULLET_RE = /^[·•‧]\s*/;

  const risikoMatch = text.match(/Risiko pacing:\s*\n([\s\S]*?)(?:Teacher autonomy:|[═]{3,}|$)/);
  if (risikoMatch) {
    for (const l of risikoMatch[1].split('\n')) {
      const t = l.trim();
      if (BULLET_RE.test(t)) risiko.push(t.replace(BULLET_RE, ''));
    }
  } else {
    warnings.push('"Risiko pacing:" tidak ditemukan di CATATAN RUNTIME GURU');
  }

  const autoMatch = text.match(/Teacher autonomy:\s*\n([\s\S]*?)(?:[═]{3,}|$)/);
  if (autoMatch) {
    for (const l of autoMatch[1].split('\n')) {
      const t = l.trim();
      if (BULLET_RE.test(t)) autonomy.push(t.replace(BULLET_RE, ''));
    }
  } else {
    warnings.push('"Teacher autonomy:" tidak ditemukan di CATATAN RUNTIME GURU');
  }

  return { risiko, autonomy };
}

// ── Group layers into skenario phases ─────────────────────────
function buildSkenario(layers) {
  const defaultDurasi = { 'Pembuka': 10, 'Inti': 30, 'Penutup': 10 };
  const groups  = [];
  let curFase   = null;
  let curLangkah = [];

  for (const lk of layers) {
    if (lk.fase !== curFase) {
      if (curFase !== null) {
        groups.push({ fase: curFase, durasi: defaultDurasi[curFase] ?? 10, langkah: curLangkah });
      }
      curFase    = lk.fase;
      curLangkah = [lk];
    } else {
      curLangkah.push(lk);
    }
  }
  if (curFase !== null) {
    groups.push({ fase: curFase, durasi: defaultDurasi[curFase] ?? 10, langkah: curLangkah });
  }

  return groups;
}

// ── Title case (small words stay lowercase) ────────────────────
function toTitleCase(str) {
  const small = new Set(['and','or','the','in','of','a','an','to','for','with','at','by','from','but','as']);
  return str.toLowerCase().split(/\s+/).map((w, i) =>
    (i === 0 || !small.has(w)) ? w.charAt(0).toUpperCase() + w.slice(1) : w
  ).join(' ');
}

// ─────────────────────────────────────────────────────────────
// Code generator
// ─────────────────────────────────────────────────────────────

function generateJS(data) {
  const { nomor, nPad, id, varName, filename, nama, tema, checklist, energi_map, catatan, skenario } = data;
  const today = new Date().toISOString().slice(0, 10);

  const out = [];

  out.push(`/**`);
  out.push(` * =============================================================`);
  out.push(` * FLAF — TP ${nomor} (${nama})`);
  out.push(` * File: ${filename}`);
  out.push(` * Format: v5.0`);
  out.push(` * Source: flaf-skenario-tp${nPad}-v2.txt`);
  out.push(` * Generated: ${today}`);
  out.push(` * TODO: kelas / deskripsi / indikator / vocab / persiapan / media / printables`);
  out.push(` *        tidak dapat diparsing dari txt — isi manual sebelum digunakan.`);
  out.push(` * =============================================================`);
  out.push(` */`);
  out.push(``);
  out.push(`const ${varName} = {`);
  out.push(``);
  out.push(`  id       : '${id}',`);
  out.push(`  nomor    : ${nomor},`);
  out.push(`  kelas    : 0,          // TODO: isi manual`);
  out.push(`  nama     : ${sq(nama)},`);
  out.push(`  tema     : ${sq(tema)},`);
  out.push(`  deskripsi: '',         // TODO: isi manual`);
  out.push(``);
  out.push(`  indikator: [],         // TODO: isi manual`);
  out.push(`  vocab    : [],         // TODO: isi manual`);
  out.push(`  persiapan: [],         // TODO: isi manual`);
  out.push(`  media    : [],         // TODO: isi manual`);
  out.push(`  printables: [],        // TODO: isi manual`);
  out.push(``);
  out.push(`  checklist: [`);
  for (const item of checklist) out.push(`    ${sq(item)},`);
  out.push(`  ],`);
  out.push(``);
  out.push(`  energi_map: [`);
  for (const e of energi_map) out.push(`    ${sq(e)},`);
  out.push(`  ],`);
  out.push(``);
  out.push(`  catatan: {`);
  out.push(`    risiko: [`);
  for (const r of catatan.risiko) out.push(`      ${sq(r)},`);
  out.push(`    ],`);
  out.push(`    autonomy: [`);
  for (const a of catatan.autonomy) out.push(`      ${sq(a)},`);
  out.push(`    ],`);
  out.push(`  },`);
  out.push(``);
  out.push(`  skenario: [`);
  out.push(``);

  for (const fase of skenario) {
    out.push(`    {`);
    out.push(`      fase  : ${sq(fase.fase)},`);
    out.push(`      durasi: ${fase.durasi},  // TODO: verifikasi`);
    out.push(``);
    out.push(`      langkah: [`);
    out.push(``);

    for (const lk of fase.langkah) {
      out.push(`        // L${lk.num} — ${fase.fase.toUpperCase()}`);
      out.push(`        {`);
      out.push(`          tipe   : 'instruksi',`);
      out.push(`          teks   : ${tl(lk.teks)},`);
      out.push(`          bantuan: ${fmtBantuan(lk.bantuan)},`);
      out.push(`          cue    : ${fmtNullable(lk.cue)},`);
      out.push(`          darurat: ${fmtNullable(lk.darurat)},`);
      out.push(`          energi : ${sq(lk.energi)},`);
      out.push(`        },`);
      out.push(``);
    }

    out.push(`      ],`);
    out.push(`    },`);
    out.push(``);
  }

  out.push(`  ],`);
  out.push(``);
  out.push(`};`);
  out.push(``);
  out.push(`export default ${varName};`);
  out.push(``);

  return out.join('\n');
}

// ── String helpers ─────────────────────────────────────────────

/** Single-quoted JS string literal — escapes \ and ' */
function sq(str) {
  if (str === null || str === undefined) return 'null';
  return "'" + String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
}

/** Template literal — escapes ` and ${ */
function tl(str) {
  if (!str) return "''";
  const escaped = String(str)
    .replace(/\\/g, '\\\\')
    .replace(/`/g,  '\\`')
    .replace(/\$\{/g, '\\${');
  return '`' + escaped + '`';
}

function fmtNullable(val) {
  return (val === null || val === undefined) ? 'null' : sq(val);
}

function fmtBantuan(val) {
  if (val === null || val === undefined) return 'null';
  if (Array.isArray(val)) {
    const items = val.map(v => `            ${sq(v)},`).join('\n');
    return `[\n${items}\n          ]`;
  }
  return sq(val);
}
</script>

</body>
</html>
